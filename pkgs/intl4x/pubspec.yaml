name: intl4x
description: >-
  A lightweight modular library for internationalization (i18n) functionality.
version: 0.13.0-wip
repository: https://github.com/dart-lang/i18n/tree/main/pkgs/intl4x
issue_tracker: https://github.com/dart-lang/i18n/issues?q=is%3Aissue+is%3Aopen+label%3Apackage%3Aintl4x
publish_to: none

platforms:
  web:
  android:
  ios:
  linux:
  macos:
  windows:

topics:
  - i18n

environment:
  sdk: ^3.7.0

dependencies:
  hooks: ^0.20.0
  icu4x:
    path: ../../submodules/icu4x/ffi/dart/
  meta: ^1.17.0
  record_use: ^0.4.1

dev_dependencies:
  args: ^2.7.0
  collection: ^1.19.1
  dart_flutter_team_lints: ^3.5.2
  test: ^1.26.2
  yaml_edit: ^2.2.2

hooks:
  user_defines:
    icu4x:
      buildMode: checkout
      checkoutPath: ../../submodules/icu4x/
